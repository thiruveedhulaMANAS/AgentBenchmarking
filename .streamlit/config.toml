[theme]
# Force light mode so Streamlit's Emotion CSS engine never generates
# dark background-color values (rgb(19,23,32)) for button/widget classes.
# Without this, Emotion's generated .st-emotion-cache-* classes inject
# background-color AFTER our st.markdown() CSS, winning the cascade
# even against !important rules of equal specificity.
base                     = "light"
primaryColor             = "#9B6DFF"
backgroundColor          = "#EDE9FB"
secondaryBackgroundColor = "#F8F6FF"
textColor                = "#1A1033"
font                     = "sans serif"
